<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Count Clicked</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f5f5f5;
        font-family: Arial, sans-serif;
      }

      .container {
        text-align: center;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      h1 {
        margin-bottom: 10px;
      }

      #count {
        font-size: 48px;
        margin: 20px 0;
      }

      button {
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        background-color: #2a71e2;
        color: white;
        cursor: pointer;
        transition: 0.2s;
      }

      button:hover {
        background-color: #1228a1;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Clicked</h1>
      <h2 id="count">0</h2>
      <button onclick="increaseValue()">Increase Value</button>
      <button onclick="resetValue()">Reset</button>
    </div>

    <script>
      let count = 0;
      function increaseValue() {
        count++; // หรือ count = count + 1;
        document.getElementById("count").textContent = count;
      }
      function resetValue() {
        count = 0;
        document.getElementById("count").textContent = count;
      }
    </script>
  </body>
</html>
